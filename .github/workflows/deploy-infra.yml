name: hippoject-infra-sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-and-restart:
    runs-on: [self-hosted, Linux, X64, hippoject-prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync repo to deploy path
        run: |
          mkdir -p "${{ secrets.DEPLOY_PATH }}"
          rsync -a --delete             --exclude='.git/'             --exclude='.github/'             ./ "${{ secrets.DEPLOY_PATH }}/"

      - name: Log in to GHCR for pull
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Refresh stack
        run: |
          cd "${{ secrets.DEPLOY_PATH }}"
          ./scripts/prod-pull.sh
