services:
  postgres:
    image: postgres:16-alpine
    container_name: hippoject-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hippoject}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hippoject}
      POSTGRES_DB: ${POSTGRES_DB:-hippoject}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hippoject} -d ${POSTGRES_DB:-hippoject}']
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: hippoject-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-hippoject}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-hippoject}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - '${KEYCLOAK_PORT:-8081}:8080'
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  keycloak-init:
    image: quay.io/keycloak/keycloak:26.1
    container_name: hippoject-keycloak-init
    entrypoint:
      - /bin/bash
      - /opt/keycloak-config/configure-realm.sh
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-hippoject}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      SMTP_SERVER: ${SMTP_SERVER:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${EMAIL:-}
      SMTP_USERNAME: ${EMAIL:-}
      SMTP_PASSWORD: ${PASSWORD:-}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:4200}
    volumes:
      - ./keycloak/scripts:/opt/keycloak-config:ro
    depends_on:
      keycloak:
        condition: service_started
    restart: 'no'

volumes:
  postgres_data:
